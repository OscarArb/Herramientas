<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de conexión</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fondo animado */

        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: #2563eb;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .25;
            top: -180px;
            left: -180px;
            animation: mover 12s infinite alternate;
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: #ef4444;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .18;
            bottom: -150px;
            right: -150px;
            animation: mover2 10s infinite alternate;
        }

        @keyframes mover {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(180px);
            }
        }

        @keyframes mover2 {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-150px);
            }
        }

        .card {

            position: relative;
            z-index: 2;

            width: 430px;
            max-width: 90%;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .15);

            border-radius: 25px;

            padding: 45px;

            text-align: center;

            box-shadow: 0 20px 50px rgba(0, 0, 0, .45);

            animation: aparecer .7s;
        }

        @keyframes aparecer {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        .icono {

            width: 120px;
            height: 120px;

            margin: auto;

            background: #ef4444;

            border-radius: 50%;

            display: flex;

            justify-content: center;

            align-items: center;

            color: white;

            font-size: 60px;

            box-shadow: 0 0 30px rgba(239, 68, 68, .5);

            margin-bottom: 25px;

        }

        h1 {

            color: #FFF;
            font-size: 30px;
            margin-bottom: 15px;

        }

        p {

            color: #d1d5db;
            font-size: 15px;
            line-height: 28px;

        }

        .codigo {

            margin: 30px auto;

            display: inline-block;

            background: #0f172a;

            color: #60a5fa;

            padding: 10px 20px;

            border-radius: 50px;

            font-weight: 600;

            letter-spacing: 2px;

        }

        button {

            margin-top: 10px;

            background: #2563eb;

            color: white;

            border: none;

            padding: 15px 40px;

            font-size: 16px;

            border-radius: 50px;

            cursor: pointer;

            transition: .3s;

            font-weight: 600;

        }

        button:hover {

            background: #1d4ed8;
            transform: translateY(-3px);

            box-shadow: 0 15px 25px rgba(37, 99, 235, .4);

        }

        .info {

            margin-top: 25px;

            color: #94a3b8;

            font-size: 13px;

        }

        @media(max-width:500px) {

            .card {
                padding: 35px 25px;
            }

            .icono {

                width: 90px;
                height: 90px;
                font-size: 45px;

            }

            h1 {
                font-size: 24px;
            }

        }
    </style>

</head>

<body>

    <div class="card">

        <div class="icono">
            ⚠
        </div>

        <h1>Error de conexión</h1>

        <p>

            No fue posible establecer comunicación con el servidor.

        </p>

        <div class="codigo">

            ERROR 503

        </div>

        <br>

        <button onclick="location.reload()">

            🔄 Reintentar

        </button>

        <div class="info">

            Si el problema persiste, comuníquese con el administrador del sistema.

        </div>

    </div>

</body>

</html>
