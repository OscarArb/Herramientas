<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Links Gana | Administracion</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        td a {

            color: #2563eb;

            text-decoration: none;

            font-weight: 600;

        }

        td a:hover {

            text-decoration: underline;

        }

        body {

            background: linear-gradient(135deg, #2563eb, #1e40af, #0f172a);

            min-height: 100vh;

            padding: 25px;

        }

        .container {

            max-width: 1100px;

            margin: auto;

        }

        .card {

            background: white;

            border-radius: 20px;

            padding: 25px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, .18);

            margin-bottom: 25px;

            animation: mostrar .4s;

        }

        @keyframes mostrar {

            from {

                opacity: 0;

                transform: translateY(15px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

        h1 {

            color: #1e3a8a;

            margin-bottom: 20px;

            text-align: center;

            font-size: 30px;

        }

        .form-grid {

            display: grid;

            grid-template-columns: 1fr 1fr auto;

            gap: 12px;

            margin-top: 15px;

        }

        input {

            width: 100%;

            padding: 13px;

            border: 1px solid #d6dce5;

            border-radius: 12px;

            outline: none;

            transition: .3s;

            font-size: 15px;

        }

        input:focus {

            border-color: #2563eb;

            box-shadow: 0 0 8px rgba(37, 99, 235, .25);

        }

        button {

            border: none;

            border-radius: 12px;

            padding: 13px 18px;

            cursor: pointer;

            font-weight: 600;

            transition: .25s;

        }

        button:hover {

            transform: translateY(-2px);

        }

        .btn-primary {

            background: #2563eb;

            color: white;

        }

        .btn-primary:hover {

            background: #1d4ed8;

        }

        .btn-login {

            width: 100%;

            background: #2563eb;

            color: white;

        }

        .btn-login:hover {

            background: #1d4ed8;

        }

        .btn-Volver {

            width: 100%;

            background: #475569;

            color: white;

        }

        .btn-Volver:hover {

            background: #334155;

        }

        .btn-edit {

            background: #f59e0b;

            color: white;

        }

        .btn-edit:hover {

            background: #d97706;

        }

        .btn-delete {

            background: #dc2626;

            color: white;

        }

        .btn-delete:hover {

            background: #b91c1c;

        }

        .btn-nav {

            display: inline-block;

            background: #0f172a;

            color: white;

            text-decoration: none;

            padding: 12px 18px;

            border-radius: 10px;

            margin-bottom: 20px;

            transition: .25s;

        }

        .btn-nav:hover {

            background: #020617;

        }

        table {

            width: 100%;

            border-collapse: collapse;

        }

        thead {

            background: #2563eb;

            color: white;

        }

        th {

            padding: 15px;

            text-align: left;

        }

        td {

            padding: 14px;

            border-bottom: 1px solid #edf2f7;

        }

        tbody tr {

            transition: .2s;

        }

        tbody tr:hover {

            background: #eff6ff;

        }

        .actions {

            display: flex;

            gap: 8px;

            flex-wrap: wrap;

        }

        .table-wrapper {

            overflow: auto;

        }

        #panel {

            display: none;

        }

        @media(max-width:768px) {

            .form-grid {

                grid-template-columns: 1fr;

            }

            h1 {

                font-size: 24px;

            }

            button {

                width: 100%;

            }

            .actions {

                flex-direction: column;

            }

        }
    </style>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <div class="container">

        <!-- LOGIN -->
        <div class="card" id="login">
            <h1>🔐 Administración Gana</h1>

            <p style="text-align:center;color:#64748b;margin-bottom:20px;">
                Ingrese la contraseña para acceder al panel administrativo.
            </p>
            <input type="password" id="password" placeholder="Ingrese la contraseña">
            <br><br>
            <button class="btn-login" onclick="login()">Ingresar</button>
            <br>
            <br>
            <a href="links_Soporte.html">

                <button class="btn-Volver">Volver</button>
            </a>
        </div>

        <!-- PANEL -->
        <div id="panel">

            <div class="card">
                <h1>📋 Administracion</h1>
                <div class="top-actions">
                    <a href="links_Soporte.html" class="btn-nav">🏠 Volver al inicio</a>
                </div>
                <input type="hidden" id="id">

                <div class="form-grid">
                    <input type="text" id="nombre" placeholder="Nombre del enlace">
                    <input type="text" id="url" placeholder="https://ejemplo.com">
                    <button class="btn-primary" onclick="guardar()">
                        💾 Guardar
                    </button>
                </div>
            </div>

            <div class="card table-wrapper">
                <table>
                    <thead>

                        <tr>

                            <th>📌 Nombre</th>

                            <th>🌐 URL</th>

                            <th style="width:180px;">⚙ Acciones</th>

                        </tr>

                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>

        </div>

    </div>

    <script>
        const HOJA = "Links_Gana";
        const API = "https://script.google.com/macros/s/AKfycbx4tOTC9ww0sOiFaoFVoHCYetlnBtSc4I-GNRi7ZT58ztihFIqAtss9esXc21V8Oodx/exec?hoja=Links_Gana";
        const CLAVE = "Gana2026*";

        function login() {
            const pass = document.getElementById("password").value;

            if (pass === CLAVE) {
                document.getElementById("login").style.display = "none";
                document.getElementById("panel").style.display = "block";
                cargar();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        async function cargar() {
            const res = await fetch(API);
            const data = await res.json();

            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(link => {
                tabla.innerHTML += `
            <tr>
                <td>${link.nombre}</td>
                <td>
                    <a href="${link.url}" target="_blank">
                        ${link.url}
                    </a>
                </td>
                <td>
                    <div class="actions">
                        <button class="btn-edit"
                         onclick='editar(${JSON.stringify(link)})'>

                          ✏️ Editar

                        </button>
                        <button class="btn-delete"
                            onclick='eliminar(${link.id})'>

                            🗑️ Eliminar

                        </button>
                    </div>
                </td>
            </tr>
        `;
            });
        }

        function editar(link) {
            document.getElementById("id").value = link.id;
            document.getElementById("nombre").value = link.nombre;
            document.getElementById("url").value = link.url;
        }

        async function guardar() {
            const id = document.getElementById("id").value;
            const nombre = document.getElementById("nombre").value;
            const url = document.getElementById("url").value;

            const accion = id ? "editar" : "crear";

            await fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    accion,
                    hoja: HOJA,
                    id,
                    nombre,
                    url,
                    password: CLAVE
                })
            });

            limpiar();
            cargar();
        }

        async function eliminar(id) {
            if (!confirm("¿Desea eliminar este enlace?")) return;

            await fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    accion: "eliminar",
                    hoja: HOJA,
                    id,
                    password: CLAVE
                })
            });

            cargar();
        }

        function limpiar() {
            document.getElementById("id").value = "";
            document.getElementById("nombre").value = "";
            document.getElementById("url").value = "";
        }
    </script>

</body>

</html>
